name: Daily Data Refresh + Predictions

on:
  schedule:
    # Runs 06:00 UTC daily. Fight week (Fri-Sat) also at 12:00 and 18:00 UTC.
    - cron: "0 6 * * *"
    - cron: "0 12 * * 5,6"   # Friday + Saturday extra polls (fight week)
    - cron: "0 18 * * 5,6"
  workflow_dispatch:           # allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Pull Greco1899 CSVs
        run: python -m ufc_predict.ingest.pull_greco

      - name: Initialise DB
        run: python -c "from ufc_predict.db.session import init_db; init_db()"

      - name: Load CSVs into DB
        run: python -m ufc_predict.ingest.greco_loader data/raw/greco1899

      - name: Poll upcoming cards (UFC.com + ESPN)
        run: python -m ufc_predict.ingest.upcoming_poller

      - name: Fetch fighter profile images
        continue-on-error: true
        run: python -m ufc_predict.ingest.fighter_images

      - name: Fetch closing odds (eval + Kelly sizing)
        # Allowed to fail — site may be unavailable or no upcoming odds yet
        continue-on-error: true
        run: python -m ufc_predict.ingest.odds_scraper

      - name: Fetch SportsBet markets and cache to file
        # Geo-restricted outside AU — will succeed when run locally, fail silently in CI.
        # The cached data/sportsbet_odds.json committed from local runs is used as fallback.
        continue-on-error: true
        run: python -m ufc_predict.ingest.sportsbet_scraper

      - name: Run predictions
        # Allowed to fail on first run before model is trained
        continue-on-error: true
        run: python -m ufc_predict.models.predict

      - name: Build dashboard
        run: python -m ufc_predict.serve.build_dashboard

      - name: Evaluate past predictions against fight results
        # Runs after results are ingested — measures model accuracy, Brier, log-loss
        continue-on-error: true
        run: python -m ufc_predict.eval.track_predictions

      - name: Commit updated predictions + dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          [ -f data/predictions.json ]       && git add data/predictions.json       || true
          [ -f data/sportsbet_odds.json ]    && git add data/sportsbet_odds.json    || true
          [ -f data/model_performance.json ] && git add data/model_performance.json || true
          [ -f data/fighter_images.json ]    && git add data/fighter_images.json    || true
          git diff --cached --quiet || git commit -m "chore: refresh predictions $(date -u +%Y-%m-%dT%H:%M)"
          git push
