name: Live Event Refresh

# Lightweight refresh that re-polls ESPN's scoreboard, rebuilds the dashboard,
# and commits if anything changed. Skips the heavy steps (Greco CSVs, DB
# load, closing odds, SportsBet, predict, fighter metadata, image downloads)
# that the daily refresh handles.
#
# Cadence:
#   • Every 5 min Fri/Sat/Sun UTC — covers every realistic UFC event window
#     (APAC Sat 04–14 UTC, Europe Sat 17–22 UTC, Vegas Sat 22–07 Sun UTC,
#     Friday Fight Pass cards 22 Fri–03 Sat UTC), so we follow the full card.
#   • Every 30 min Mon–Thu — picks up newly announced cards, schedule
#     changes, and any mid-week fights.
#
# Most runs are no-ops: when ESPN's response hasn't changed there's nothing
# to commit and the workflow exits in seconds.

on:
  schedule:
    - cron: "*/5 * * * 5,6,0"   # every 5 min Fri/Sat/Sun (UTC) — full event coverage
    - cron: "*/30 * * * 1-4"    # every 30 min Mon–Thu — catches announcements
  workflow_dispatch:

# Serialise pushes to main across all workflows (daily_refresh,
# weekly_retrain) so concurrent runs don't race the remote.
concurrency:
  group: main-push
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Initialise DB schema
        # data/ufc.db is not committed — without this, the poller's UpcomingBout
        # upsert fails with "no such table: upcoming_bouts". Schema-only init
        # is fast (~1s) and lets the upsert succeed; the schedule JSON would
        # be written even if it didn't, but we keep the DB consistent.
        run: python -c "from ufc_predict.db.session import init_db; init_db()"

      - name: Poll ESPN scoreboard
        # Tolerate transient ESPN failures so a single bad response doesn't
        # break the whole live-refresh window.
        continue-on-error: true
        run: python -m ufc_predict.ingest.upcoming_poller

      - name: Rebuild dashboard
        run: python -m ufc_predict.serve.build_dashboard

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/upcoming_schedule.json
          [ -f data/past_events.json ] && git add data/past_events.json || true
          if git diff --cached --quiet; then
            echo "No live changes; nothing to commit."
            exit 0
          fi
          git commit -m "chore: live refresh $(date -u +%Y-%m-%dT%H:%MZ)"

          # Push with retry: rebase onto origin/main if another workflow
          # beat us, preferring our freshly-built generated files for any
          # conflicts. Up to 3 attempts before giving up.
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt — pulling and retrying"
            git fetch origin main
            git rebase -X theirs origin/main || {
              git rebase --abort || true
              echo "Rebase failed — aborting"
              exit 1
            }
          done
          echo "Push failed after 3 attempts"
          exit 1
